<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numero magico</title>
    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <main>

        <section id="indicador">
            <div class="contenedor-informacion" id="primera-linea">
                <h1>Cantidad de intentos restantes:</h1>
                <h2 id="indicador-numero-intentos">10</h2>
            </div>

            <div class="contenedor-informacion" id="segunda-linea">
                <p>Adivine el número del 1-100</p>
                <p id="indicador-de-pista"></p>
            </div>
        </section>

        <form action="" id="teclado">
            <input type="number" placeholder="ingrese un número..." id="input-numero">
            <button type="submit" id="boton-ingresar" class="boton-accion">Ingrese</button>
        </form>

        <!-- contenedor para el registro de intentis -->
        <section id="registro-de-intentos">
            <ul id="lista">

            </ul>
        </section>

        <!-- contenedor para mostrar el estado del juego (ganó o perdió) -->
        <section id="contenedor-estado-juego">
            <h2 id="indicador-estado-juego"></h2>
            <button id="reiniciar-juego-btn" class="boton-accion">Reiniciar juego</button>
        </section>

    </main>
    <script src="js/script.js"></script>
</body>

</html>
